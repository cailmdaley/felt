decisions:
  shear_frame:
    label: "Shear reference frame"
    rationale: |
      Choose coordinates for gamma_x.
    tags: [coordinates, tier_1]
    default: galaxy
    tapestry_nodes: [shear_reference_frame, spin2_rotation]
    options:
      image:
        label: "Image frame"
        description: |
          Detector coordinates.
        excluded: true
        excluded_reason: |
          Blind spot at 45 degrees.
      galaxy:
        label: "Galaxy frame"
        description: |
          No blind spot.

analyses:
  build_mocks:
    decisions:
      rotation_curve:
        label: "Galaxy rotation curve model"
        rationale: |
          Rotation curve affects shear sensitivity.
        tags: [galaxy_model, tier_3]
        default: arctan
        options:
          arctan:
            label: "Arctan"
            description: |
              Baseline rotation model.
      intensity_profile:
        label: "Galaxy intensity profile model"
        rationale: |
          Profile shapes the likelihood.
        tags: [galaxy_model, tier_3]
        default: exponential
        options:
          sersic:
            label: "Sersic profile"
            description: |
              Generalized morphology.
            excluded: true
            excluded_reason: |
              Not implemented.
          exponential:
            label: "Exponential disk"
            description: |
              Standard disk profile.
