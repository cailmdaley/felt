version: 2

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}}

archives:
  - format: tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
    format_overrides:
      - goos: windows
        format: zip

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

# Homebrew tap publishing is only for releases cut from the public
# cailmdaley/felt repo. Releases cut from LightconeResearch/felt must not
# publish to the public tap; skip the brews stage entirely when the release
# isn't originating from the public repo.
brews:
  - repository:
      owner: cailmdaley
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: https://github.com/cailmdaley/felt
    description: DAG-native task tracker. Markdown files with dependencies.
    license: MIT
    test: |
      system "#{bin}/felt", "--help"
    install: |
      bin.install "felt"
    # Refresh the Claude Code plugin in lockstep with the binary so users who
    # `brew upgrade felt` pick up new hooks and skills without a separate
    # plugin step. Skipped silently if the claude CLI isn't on PATH yet.
    post_install: |
      if which("claude")
        system "#{bin}/felt", "setup", "claude"
      end
    skip_upload: '{{ if ne .Env.GITHUB_REPOSITORY "cailmdaley/felt" }}true{{ else }}false{{ end }}'
