version: 2

before:
  hooks:
    - go mod tidy
    - go generate ./...
    # Guard: refuse to release if the plugin manifests haven't been
    # bumped to the tag's version. Claude Code and Codex both compare
    # plugin.json version when running `plugin update`; shipping a
    # release whose manifests still show the previous version means no
    # client actually picks up the new content. Use scripts/release.sh
    # to keep these in sync automatically.
    - bash -c 'claude_v=$(jq -r .version claude-plugin/.claude-plugin/plugin.json); codex_v=$(jq -r .version claude-plugin/.codex-plugin/plugin.json); if [ "$claude_v" != "{{ .Version }}" ] || [ "$codex_v" != "{{ .Version }}" ]; then echo "plugin manifests at $claude_v / $codex_v, tag at {{ .Version }} — bump via scripts/release.sh" >&2; exit 1; fi'

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}}

archives:
  - format: tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
    format_overrides:
      - goos: windows
        format: zip

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

# Homebrew tap publishing is only for releases cut from the public
# cailmdaley/felt repo. Releases cut from LightconeResearch/felt must not
# publish to the public tap; skip the brews stage entirely when the release
# isn't originating from the public repo.
brews:
  - repository:
      owner: cailmdaley
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: https://github.com/cailmdaley/felt
    description: DAG-native task tracker. Markdown files with dependencies.
    license: MIT
    test: |
      system "#{bin}/felt", "--help"
    install: |
      bin.install "felt"
    # Refresh integrations in lockstep with the binary so users who
    # `brew upgrade felt` pick up new hooks and skills without a separate
    # step. The Claude plugin refresh is skipped silently if the claude CLI
    # isn't on PATH; the Codex refresh is gated by `felt update`'s own
    # detection of an installed Codex setup, so a no-Codex machine is a
    # no-op.
    post_install: |
      if which("claude")
        system "#{bin}/felt", "setup", "claude"
      end
      # Only re-run `felt setup codex` for users who already have Codex
      # integration installed — never silently install Codex hooks for
      # users who didn't ask for them. The detection mirrors the binary's
      # own feltCodexInstalled(): plugin entry in config.toml (1.0.8+) or
      # legacy session.sh reference in hooks.json (pre-1.0.8).
      codex_config = "#{ENV["HOME"]}/.codex/config.toml"
      codex_hooks = "#{ENV["HOME"]}/.codex/hooks.json"
      # TOML quotes keys with single or double quotes depending on the
      # writer; substring-match the plugin ref instead of the full header
      # so either form is detected.
      codex_installed = (File.exist?(codex_config) && File.read(codex_config).include?("felt@cailmdaley-felt")) ||
                       (File.exist?(codex_hooks) && File.read(codex_hooks).include?("/hooks/session.sh"))
      if codex_installed && which("codex")
        system "#{bin}/felt", "setup", "codex"
      end
    skip_upload: '{{ if ne .Env.GITHUB_REPOSITORY "cailmdaley/felt" }}true{{ else }}false{{ end }}'
