$schema: https://astra-spec.org/v1/analysis.schema.json
version: '1.0'
name: Project Fibers
inputs:
- id: felt_node_context
  type: data
  description: Synthetic context input for a structural felt analysis node.
outputs:
- id: felt_node_report
  type: report
  description: Synthetic report output for a structural felt analysis node.
analyses:
  citation-audit:
    name: Citation audit
    tags:
    - pure-eb
    - literature
    - astra
    - example
    - lightcone
    - felt
    description: Build a traceable citation graph for the UNIONS B-modes paper by mapping manuscript claims to supporting
      evidence in the cited literature or local companion-paper sources, while recording any citation fixes discovered along
      the way.
    inputs:
    - id: bmodes_tex
      type: data
      source: docs/unions_release/unions_bmodes/unions_bmodes.tex
      description: B-modes manuscript source containing the citation-bearing sentences under review.
    - id: bmodes_bib
      type: data
      source: docs/unions_release/unions_bmodes/unions_bmodes.bib
      description: Bibliography entries for all cited papers.
    - id: literature_cache
      type: data
      source: docs/arxiv/
      description: Cached arXiv source trees used for primary-text verification.
    outputs:
    - id: citation_ledger
      type: data
      description: JSON ledger mapping citation-bearing sentences to cited keys and bibliography metadata.
    - id: foundations_report
      type: report
      description: Worker audit report for foundational weak-lensing and early-detection citations.
    - id: methods_report
      type: report
      description: Worker audit report for methodology, estimator, and covariance citations.
    - id: survey_results_report
      type: report
      description: Worker audit report for Stage-III survey and B-mode-results citations.
    - id: unions_internal_report
      type: report
      description: Worker audit report for UNIONS companion-paper and internal-method citations.
    insights:
      aperture_mass_foundation_support:
        claim: The manuscript's aperture-mass discussion is supported when it presents aperture mass dispersion as the foundational
          real-space E/B-separation method and attributes the zero-separation limitation to later finite-interval work.
        created_at: 2026-04-02 16:52:00+00:00
        tags:
        - citation_graph
        - literature
        - methods
        notes: The current wording keeps the foundational aperture-mass attribution while sourcing the zero-separation limitation
          to later finite-interval E/B-separation work.
        evidence:
        - id: schneider_aperture_mass
          doi: 10.1051/aas:1996132
          quote:
            type: TextQuoteSelector
            exact: The aperture mass can thus be used to detect dark matter concentrations.
          location:
            type: LineSelector
            start: 381
            end: 381
        - id: schneider_aperture_mass_dispersion
          doi: 10.1046/j.1365-8711.1998.01741.x
          quote:
            type: TextQuoteSelector
            exact: The dispersion of \m, \ave{\m^2(\theta)}, can be expressed as a convolution of the power spectrum of the
              projected density field with a filter function which is strongly peaked.
          location:
            type: LineSelector
            start: 1970
            end: 1972
        - id: sek_zero_separation
          doi: 10.1051/0004-6361/200913413
          quote:
            type: TextQuoteSelector
            exact: the calculation of the aperture dispersion requires the knowledge of the shear correlation functions down
              to zero separation
          location:
            type: LineSelector
            start: 221
            end: 225
        - id: schneider22_zero_separation
          doi: 10.1051/0004-6361/202142479
          quote:
            type: TextQuoteSelector
            exact: the calculation of the aperture mass dispersion requires knowledge of the shear correlation function down
              to zero separation
          location:
            type: LineSelector
            start: 282
            end: 284
      cfht_megacam_lineage_support:
        claim: The manuscript's detector-lineage sentence is supported when it frames the repeating pattern as suggestive
          of a detector-level phenomenon rather than a pipeline-specific artifact, and notes that CFHTLenS and the UNIONS
          weak-lensing data both used MegaCam on CFHT.
        created_at: 2026-04-02 16:45:00+00:00
        tags:
        - citation_graph
        - literature
        - survey
        notes: The current wording avoids over-claiming survey lineage and instead emphasizes the shared MegaCam/CFHT hardware
          context.
        evidence:
        - id: guinot_megacam_cfht
          doi: 10.1051/0004-6361/202141847
          quote:
            type: TextQuoteSelector
            exact: CFIS is a large imaging survey observing the Northern hemisphere with the wide-field imager \textsc{MegaCAM}
              on CFHT (pixel scale of 0.187 arcsec).
          location:
            type: LineSelector
            start: 202
            end: 202
        - id: heymans_cfhtlens_megacam
          doi: 10.1111/j.1365-2966.2012.21952.x
          quote:
            type: TextQuoteSelector
            exact: This work is based on observations obtained with MegaPrime/MegaCam
          location:
            type: LineSelector
            start: 625
            end: 625
      config_space_binning_support:
        claim: The manuscript's xi binning sentence is supported when it refers to the 20 logarithmic bins over 1--250 arcmin
          as the configuration-space data-vector binning in Paper III, rather than as the cosmological-inference scale range.
        created_at: 2026-04-02 16:28:41+00:00
        tags:
        - citation_graph
        - literature
        - methods
        notes: Uses the provisional local-document evidence extension because Paper III is a local companion manuscript rather
          than a DOI-backed publication.
        evidence:
        - id: paper_iii_data_vector_binning
          document:
            path: docs/unions_release/unions_2d_shear_xi/main.tex
            commit: f5a0138e8a6e81d14dbbac7c25bce8526454121a
          quote:
            type: TextQuoteSelector
            exact: In Fig. xi_pm we present the xi_pm(theta) data vectors computed by TreeCorr, where we have binned the separation
              angle theta into 20 logarithmically-spaced bins over 1--250 arcmin.
          location:
            type: LineSelector
            start: 234
            end: 234
        - id: paper_iii_inference_scale_cuts
          document:
            path: docs/unions_release/unions_2d_shear_xi/main.tex
            commit: f5a0138e8a6e81d14dbbac7c25bce8526454121a
          quote:
            type: TextQuoteSelector
            exact: we obtain theta in [5, 83] arcmin for xi_plus and theta in [12,83] for xi_minus
          location:
            type: LineSelector
            start: 636
            end: 636
      higher_order_bmode_support:
        claim: The manuscript's higher-order B-mode sentence is supported when it states that lens-lens coupling, source clustering,
          and intrinsic alignments can generate B modes, that these signals are far below current sensitivity, and that future
          ultra-high-precision cross-correlation approaches involving CMB rotation reconstructions and large-scale-structure
          tracers may access them.
        created_at: 2026-04-02 16:28:41+00:00
        tags:
        - citation_graph
        - literature
        - foundations
        notes: The original sentence was too categorical about the required detection strategy and has been weakened to match
          the cited support.
        evidence:
        - id: hilbert_born_lenslens
          doi: 10.1051/0004-6361/200811054
          quote:
            type: TextQuoteSelector
            exact: Cosmic-shear B-modes, which are induced by Born corrections and lens-lens coupling, are at least three
              orders of magnitude smaller than cosmic-shear E-modes.
          location:
            type: LineSelector
            start: 132
            end: 132
        - id: schneider_source_clustering
          doi: 10.1051/0004-6361:20020626
          quote:
            type: TextQuoteSelector
            exact: B-modes in fact are produced by lensing itself. The effect comes about through the clustering of source
              galaxies.
          location:
            type: LineSelector
            start: 180
            end: 183
        - id: crittenden_intrinsic_alignments
          doi: 10.1086/338838
          quote:
            type: TextQuoteSelector
            exact: the distortion field resulting from intrinsic spin alignments is not curl free
          location:
            type: LineSelector
            start: 54
            end: 56
        - id: cooray_future_precision
          doi: 10.1086/340892
          quote:
            type: TextQuoteSelector
            exact: all these corrections are at least two orders of magnitude below the convergence or E-mode power and hence
              relevant only to future ultra high precision measurements
          location:
            type: LineSelector
            start: 111
            end: 113
        - id: robertson_cross_correlation
          doi: 10.1088/1475-7516/2025/02/034
          quote:
            type: TextQuoteSelector
            exact: the curl can be probed in cross-correlation between a direct reconstruction and a template formed using
              pairs of large-scale structure tracers to emulate the lens-lens coupling
          location:
            type: LineSelector
            start: 92
            end: 92
      hsc_large_scale_bmode_support:
        claim: The manuscript's HSC Y3 sentence is supported when it separates the detection of significant large-scale B
          modes from the later attribution of a leading additive contaminant to PSF fourth-moment leakage.
        created_at: 2026-04-02 19:15:00+00:00
        tags:
        - citation_graph
        - literature
        - survey
        notes: Li et al. and Dalal et al. support the presence of large-scale B modes in the HSC Y3 analysis, while Zhang
          et al. support the PSF fourth-moment leakage mechanism in the affected region.
        evidence:
        - id: li_hsc_large_scale_bmodes
          doi: 10.1103/PhysRevD.108.123518
          quote:
            type: TextQuoteSelector
            exact: including galaxy shapes in this region causes significant B-modes in 2PCFs at high redshifts and large
              scales
          location:
            type: LineSelector
            start: 601
            end: 602
        - id: dalal_hsc_large_scale_bmodes
          doi: 10.1103/PhysRevD.108.123519
          quote:
            type: TextQuoteSelector
            exact: we find evidence of significant B modes at large scales, namely \ell < 300
          location:
            type: LineSelector
            start: 1177
            end: 1178
        - id: zhang_hsc_fourth_moment
          doi: 10.1093/mnras/stad1801
          quote:
            type: TextQuoteSelector
            exact: leakage from the spin-2 combination of PSF fourth moments is the leading contributor to additive shear
              systematics
          location:
            type: LineSelector
            start: 101
            end: 101
      hybrideb_bandpower_support:
        claim: The manuscript's HybridEB sentence is supported when it states that the estimator forms Fourier band-powers
          from linear combinations of binned xi_pm measurements and projects out ambiguous modes to minimize E/B mixing.
        created_at: 2026-04-02 16:58:00+00:00
        tags:
        - citation_graph
        - literature
        - methods
        notes: The original wording over-claimed cross-method equivalence; Becker and Rozo directly support the band-power
          construction and the projection of ambiguous modes to minimize E/B mixing.
        evidence:
        - id: becker_rozo_linear_combinations
          doi: 10.1093/mnras/stv3018
          quote:
            type: TextQuoteSelector
            exact: They can be written as linear combinations of the binned cosmic shear correlation functions.
          location:
            type: LineSelector
            start: 46
            end: 47
        - id: becker_rozo_ambiguous_modes
          doi: 10.1093/mnras/stv3018
          quote:
            type: TextQuoteSelector
            exact: these vectors correspond to ambiguous modes which cannot uniquely be classified as either E- or B-modes
              on a finite patch of sky
          location:
            type: LineSelector
            start: 187
            end: 189
      psf_leakage_method_support:
        claim: The manuscript's object-wise PSF-leakage sentence is supported by Paper I for the concrete SNR-size regression
          correction and by Guerrini et al. for the broader PSF-leakage diagnostic framework used to assess its impact.
        created_at: 2026-04-02 13:25:11+00:00
        tags:
        - citation_graph
        - literature
        - psf
        notes: Uses the provisional local-document evidence extension for Paper I pending upstream ASTRA support for unpublished
          manuscripts.
        evidence:
        - id: paper_i_psf_method
          document:
            path: docs/unions_release/unions_shear_catalog_paper/draft_corrected.tex
            commit: c873aa76e2687f2abf3b769573e07ad777dd093b
          quote:
            type: TextQuoteSelector
            exact: We build a 20 x 20 grid in (SNR, size) and compute the PSF leakage coefficient alpha using a linear regression
              in each bin.
          location:
            type: LineSelector
            start: 929
            end: 929
        - id: guerrini_psf_framework
          doi: 10.1051/0004-6361/202453512
          quote:
            type: TextQuoteSelector
            exact: The goal of this paper is to provide a methodology to compute fast and accurate estimates of PSF systematics
              that pollute two-point cosmic shear correlation function.
          location:
            type: LineSelector
            start: 1043
            end: 1043
      treecorr_method_support:
        claim: The manuscript's xi estimator sentence is supported when it cites TreeCorr as a tree-based correlation package,
          with Jarvis et al. 2004 as the foundational methodological reference.
        created_at: 2026-04-02 13:25:11+00:00
        tags:
        - citation_graph
        - literature
        - methods
        notes: TreeCorr's documentation points to Jarvis, Bernstein, and Jain 2004 as the foundational reference; the ASCL
          software record can be cited alongside it for package provenance.
        evidence:
        - id: jarvis_tree_algorithm
          doi: 10.1111/j.1365-2966.2004.07926.x
          quote:
            type: TextQuoteSelector
            exact: The specific technique for implementing this type of algorithm is to create a so-called kd-tree (with k=2
              in this case) for the data.
          location:
            type: LineSelector
            start: 701
            end: 703
  b-mode-analysis-demo:
    name: B-mode analysis (visualization demo)
    description: 'Systematic validation of B-mode shear signals in the UNIONS cosmic shear survey. Three complementary estimators
      (pure E/B, COSEBIS, pseudo-Cℓ) across four catalog versions demonstrate B-modes consistent with noise at fiducial scale
      cuts.

      '
    tags:
    - weak-lensing
    - b-modes
    - unions
    - null-tests
    - cosmic-shear
    inputs:
    - id: shear_catalog
      type: data
      source: SP_v1.4.6_leak_corr
      description: 'UNIONS/CFIS shear catalog (v1.4.6, leak-corrected): 67M galaxies, 2405 deg², three blinded n(z).'
    - id: survey_mask
      type: data
      source: footprint_mask_nside4096
      description: HEALPix footprint mask at nside=4096, n_exp > 3 spatial cut.
    - id: planck_cosmology
      type: data
      source: astropy.cosmology.Planck18
      description: Planck 2018 best-fit LCDM for all theoretical covariance predictions.
    outputs:
    - id: b_mode_validation
      type: report
      description: B-mode null-test results establishing shear pipeline readiness for cosmic shear cosmology.
    - id: scale_cut_recommendation
      type: report
      description: Fiducial angular scale cuts for the UNIONS config-space and harmonic-space cosmology papers.
    analyses:
      shear-correlation:
        name: Shear two-point correlation functions
        description: Measure ξ±(θ) in 1000 log-spaced bins over 1–500' via TreeCorr, rebin to 20 reporting bins.
        inputs:
        - id: catalog
          type: data
          from: shear_catalog
        outputs:
        - id: xi_pm_1000bin
          type: data
          description: ξ±(θ) at 1000-bin integration resolution for E/B decomposition.
        - id: xi_pm_20bin
          type: data
          description: ξ±(θ) rebinned to 20 log-spaced bins over 1–250 arcmin.
        decisions:
          binning:
            label: Integration binning for E/B decomposition
            rationale: 1000-bin resolution captures the oscillatory COSEBIS filter functions; coarser binning aliases high-n
              modes.
            default: fine_1000
            options:
              fine_1000:
                label: 1000 log-spaced bins, 1–500 arcmin
              coarse_100:
                label: 100 log-spaced bins
                excluded: true
                excluded_reason: Aliases COSEBIS Wn(ℓ) filter functions above mode n ~ 8.
      pseudo-cl-estimation:
        name: Pseudo-Cℓ power spectrum estimation
        description: NaMaster pseudo-Cℓ estimation of C_ℓ^{EE,BB,EB} with mode-coupling correction. 32 sqrt(ℓ)-spaced bins,
          ℓ = 100–3000.
        inputs:
        - id: catalog
          type: data
          from: shear_catalog
        - id: mask
          type: data
          from: survey_mask
        outputs:
        - id: cl_bb
          type: data
          description: B-mode auto-power spectrum C_ℓ^BB in 32 bandpower bins.
        - id: cl_eb
          type: data
          description: E-B cross-power spectrum C_ℓ^EB.
        decisions:
          ell_binning:
            label: Bandpower binning scheme
            rationale: sqrt(ℓ) spacing gives uniform fractional bandwidth, matching the mode-coupling matrix resolution.
            default: sqrt_ell_32
            options:
              sqrt_ell_32:
                label: 32 bins, sqrt(ℓ)-linear from ℓ = 100–3000
              log_ell_96:
                label: 96 log-spaced bins
                excluded: true
                excluded_reason: Excess bins degrade S/N per bin without improving scale-cut resolution.
      pure-eb-decomposition:
        name: Pure E/B mode decomposition
        description: Schneider et al. (2002) decomposition of ξ±(θ) into pure E, B, and ambiguous components.
        inputs:
        - id: xi_fine
          type: data
          from: shear-correlation.xi_pm_1000bin
        outputs:
        - id: xi_b_plus
          type: data
          description: Pure B-mode correlation function ξ+^B(θ) in 20 bins.
        - id: xi_b_minus
          type: data
          description: Pure B-mode correlation function ξ-^B(θ) in 20 bins.
        findings:
          b_consistent_with_zero:
            claim: ξ+^B and ξ-^B consistent with zero at fiducial cuts (5–83' for ξ+, 12–83' for ξ-).
            tags:
            - null-test
            - result
      cosebis-measurement:
        name: COSEBIS B-mode measurement
        description: 'Complete Orthogonal Sets of E/B-Integrals: model-independent discrete modes with clean E/B separation.
          Modes 1–20 computed; fiducial uses 1–6.'
        inputs:
        - id: xi_fine
          type: data
          from: shear-correlation.xi_pm_1000bin
        outputs:
        - id: cosebis_bn
          type: data
          description: COSEBIS B-modes B_n for n = 1–20.
        decisions:
          fiducial_modes:
            label: Number of fiducial COSEBIS modes
            rationale: Modes above n = 6 probe scales where CosmoCov covariance is unreliable; mock validation shows χ²/dof
              ~ 60/20 at high modes.
            default: modes_1_to_6
            options:
              modes_1_to_6:
                label: n = 1–6 (fiducial)
              modes_1_to_20:
                label: n = 1–20 (full range)
                excluded: true
                excluded_reason: CosmoCov ξ± covariance miscalibrated above n ~ 8; harmonic path adequate but config path
                  χ²/dof = 60/20.
        findings:
          cosebis_null:
            claim: COSEBIS B_n/sigma_n consistent with zero at fiducial and full angular range for v1.4.6.3.
            tags:
            - null-test
            - result
      config-space-covariance:
        name: Configuration-space covariance
        description: CosmoCov Gaussian covariance at 1000-bin resolution, propagated analytically (COSEBIS via T-matrix) and
          via MC (pure E/B, 2000 samples).
        inputs:
        - id: cosmology
          type: data
          from: planck_cosmology
        - id: mask
          type: data
          from: survey_mask
        outputs:
        - id: cov_pure_eb
          type: data
          description: '120×120 pure E/B covariance (6 blocks: ξ+/ξ- × E/B/amb, each 20 bins).'
        - id: cov_cosebis
          type: data
          description: Covariance matrix for COSEBIS modes via analytic T-matrix propagation.
        decisions:
          gaussian_only:
            label: Gaussian-only covariance for null tests
            rationale: 'Non-Gaussian terms are prohibitive at 1000-bin resolution and unnecessary: Gaussian covariance underestimates
              error bars, making B-mode null tests conservative.'
            default: gaussian
            options:
              gaussian:
                label: Gaussian analytic (CosmoCov)
              non_gaussian:
                label: Non-Gaussian (SSC + connected)
                excluded: true
                excluded_reason: Computationally prohibitive at 1000-bin integration scale; underestimating covariance is
                  conservative for null tests.
        findings:
          covariance_well_conditioned:
            claim: E and B blocks well-conditioned (kappa ~ 10^5); ill-conditioning confined to ambiguous modes (kappa ~ 10^15).
            tags:
            - validation
      harmonic-covariance:
        name: Harmonic-space covariance
        description: Knox-formula Gaussian covariance for C_ℓ^BB bandpowers via NaMaster. Validated against 350 GLASS mocks.
        inputs:
        - id: mask
          type: data
          from: survey_mask
        - id: cosmology
          type: data
          from: planck_cosmology
        outputs:
        - id: cov_cl_bb
          type: data
          description: Bandpower covariance matrix for C_ℓ^BB.
        findings:
          knox_validated:
            claim: 'Knox covariance perfectly calibrated on GLASS mocks: per-mock PTE 0.51–0.91 for C_ℓ^BB.'
            tags:
            - validation
            - mock
      blind-independence:
        name: Covariance blind independence
        description: Verify BB covariances are independent of blinding cosmology. Data vectors identical across blinds A/B/C;
          covariances differ via blind-specific n(z).
        inputs:
        - id: cov_eb
          type: data
          from: config-space-covariance.cov_pure_eb
        - id: cov_cosebis
          type: data
          from: config-space-covariance.cov_cosebis
        - id: cov_cl
          type: data
          from: harmonic-covariance.cov_cl_bb
        outputs:
        - id: blind_consistency_report
          type: report
          description: Diagonal covariance ratios (B/A, C/A) across all three estimator spaces.
        findings:
          analytic_exact:
            claim: COSEBIS exactly blind-independent (< 0.001%); pure E/B ~13% (MC noise); harmonic ~8% (E-to-B leakage at
              ell < 100). All within noise floors.
            tags:
            - validation
            - key-finding
      psf-leakage-correction:
        name: PSF leakage correction
        description: Object-wise PSF leakage correction via linear regression on a 20x20 (SNR, size) grid.
        inputs:
        - id: catalog
          type: data
          from: shear_catalog
        outputs:
        - id: corrected_ellipticities
          type: data
          description: Leak-corrected ellipticity columns (e1_leak_corrected, e2_leak_corrected).
        decisions:
          correction_method:
            label: PSF leakage correction method
            rationale: Object-wise regression captures spatially varying PSF patterns that mean subtraction misses.
            default: object_wise_grid
            options:
              object_wise_grid:
                label: Object-wise 20×20 (SNR, size) grid regression
              mean_subtraction:
                label: Global mean PSF subtraction
                excluded: true
                excluded_reason: Cannot capture PSF fourth-moment patterns that vary across the MegaCam focal plane.
        findings:
          leakage_impact:
            claim: 'PSF leakage correction improves full-range PTEs by factors of 1.3–6.6× depending on estimator, but fiducial
              scale cuts already exclude the most contaminated scales, reducing the benefit to 1–1.5× at fiducial cuts.

              '
            tags:
            - systematics
            - result
      config-space-ptes:
        name: Configuration-space PTE matrices
        description: 'PTE heatmaps across all (θ_min, θ_max) for ξ+^B, ξ-^B, COSEBIS B_n. Each cell: χ² test of B = 0.'
        inputs:
        - id: xi_b_plus
          type: data
          from: pure-eb-decomposition.xi_b_plus
        - id: xi_b_minus
          type: data
          from: pure-eb-decomposition.xi_b_minus
        - id: cosebis_bn
          type: data
          from: cosebis-measurement.cosebis_bn
        - id: cov_eb
          type: data
          from: config-space-covariance.cov_pure_eb
        - id: cov_cosebis
          type: data
          from: config-space-covariance.cov_cosebis
        outputs:
        - id: pte_heatmaps
          type: data
          description: PTE matrices for ξ+^B, ξ-^B, COSEBIS B_n across angular scale combinations.
        - id: fiducial_ptes
          type: report
          description: PTE values at fiducial scale cuts for the main-text results table.
        findings:
          fiducial_pass:
            claim: 'At fiducial scale cuts (5–83'' for ξ+, 12–83'' for ξ-), v1.4.6 passes with joint PTE of 0.37/0.24/0.72
              (ξ+^B/ξ-^B/joint). COSEBIS modes 1–6 pass universally across all angular ranges tested.

              '
            tags:
            - null-test
            - result
            - key-finding
      harmonic-ptes:
        name: Harmonic-space PTE matrices
        description: 'χ² null tests for C_ℓ^BB and C_ℓ^EB across bandpower ranges. Fiducial: ℓ = 300–1600.'
        inputs:
        - id: cl_bb
          type: data
          from: pseudo-cl-estimation.cl_bb
        - id: cl_eb
          type: data
          from: pseudo-cl-estimation.cl_eb
        - id: cov_cl
          type: data
          from: harmonic-covariance.cov_cl_bb
        outputs:
        - id: harmonic_pte_matrix
          type: data
          description: PTE heatmap across (ℓ_min, ℓ_max) for C_ℓ^BB.
        - id: harmonic_fiducial_ptes
          type: report
          description: PTE at fiducial ℓ = 300–1600 scale cuts.
        findings:
          harmonic_pass:
            claim: 'C_ℓ^BB passes at fiducial cuts (PTE = 0.35). Harmonic-space tests are less sensitive to localized B-mode
              contamination because bandpowers average over angular scales, explaining why v1.4.8 passes harmonic but fails
              config-space tests.

              '
            tags:
            - null-test
            - result
      mock-validation:
        name: Mock validation
        description: 'End-to-end validation on 350 GLASS mock catalogs: verify pipeline recovers correct PTEs when B = 0.'
        inputs:
        - id: cov_eb
          type: data
          from: config-space-covariance.cov_pure_eb
        - id: cov_cosebis
          type: data
          from: config-space-covariance.cov_cosebis
        - id: cov_cl
          type: data
          from: harmonic-covariance.cov_cl_bb
        outputs:
        - id: mock_pte_distribution
          type: data
          description: Per-mock PTE distributions for all three estimators.
        findings:
          pseudo_cl_calibrated:
            claim: 'Pseudo-Cℓ BB with Knox covariance is perfectly calibrated (per-mock PTE 0.51–0.91). COSEBIS modes 1–5
              well-calibrated via harmonic path (χ²/dof = 1.3/5). Pure E/B MC-propagated covariance overestimates scatter
              (χ²/dof ~ 67–74/20), traced to off-diagonal structure amplification in the MC propagation step — conservative
              for null tests.

              '
            tags:
            - validation
            - mock
            - key-finding
      version-comparison:
        name: Catalog version comparison
        description: Recompute B-mode statistics across v1.4.5/6/8/11.3 +/- PSF correction. Demonstrates results are not version-tuned.
        inputs:
        - id: pte_config
          type: data
          from: config-space-ptes.pte_heatmaps
        - id: pte_harmonic
          type: data
          from: harmonic-ptes.harmonic_pte_matrix
        outputs:
        - id: version_pte_table
          type: report
          description: PTE comparison table across all versions and estimators.
        - id: version_figures
          type: data
          description: Per-version data vector and PTE heatmap figures for appendix.
        decisions:
          fiducial_version:
            label: Fiducial catalog version
            rationale: v1.4.6 is the first version passing both config-space and harmonic-space PTE tests simultaneously.
            default: v146
            options:
              v146:
                label: v1.4.6 — Size cuts enforced, passes config + harmonic
              v145:
                label: v1.4.5 — Initial, fails harmonic (PTE = 0.034)
                excluded: true
                excluded_reason: Fails harmonic-space null test.
              v148:
                label: v1.4.8 — Masking improvements, fails config-space
                excluded: true
                excluded_reason: Introduces additional B-mode systematic beyond PSF leakage; fails config-space tests.
        findings:
          version_stability:
            claim: 'v1.4.6 is the unique catalog version passing both config-space and harmonic-space B-mode null tests. v1.4.5
              fails harmonic (PTE 0.034); v1.4.8 fails config-space (additional systematic). Version comparison across four
              versions demonstrates the diagnostic power of the multi-estimator approach.

              '
            tags:
            - validation
            - key-finding
      scale-cuts:
        name: Fiducial scale cut selection
        description: Select angular scale cuts where all B-mode PTEs are healthy. Defines safe range for cosmological inference.
        inputs:
        - id: config_ptes
          type: data
          from: config-space-ptes.pte_heatmaps
        - id: harmonic_ptes
          type: data
          from: harmonic-ptes.harmonic_pte_matrix
        - id: version_results
          type: data
          from: version-comparison.version_pte_table
        outputs:
        - id: fiducial_scale_cuts
          type: data
          description: Recommended scale cuts for config-space and harmonic-space cosmology papers.
        decisions:
          config_space_cuts:
            label: Configuration-space fiducial scale cuts
            rationale: Chosen to exclude the small-scale region where PSF leakage drives B-modes above noise, while retaining
              maximum constraining power for S₈.
            default: standard
            options:
              standard:
                label: 'ξ+: 5–83'', ξ-: 12–83'', COSEBIS modes 1–6'
              aggressive:
                label: 'ξ+: 3–250'', ξ-: 3–250'''
                excluded: true
                excluded_reason: Includes scales where B-modes fail null tests at fiducial catalog version.
          harmonic_cuts:
            label: Harmonic-space scale cuts
            rationale: ℓ_min = 300 excludes E→B leakage from mode-coupling instability; ℓ_max = 1600 matches the harmonic
              paper's inference range.
            default: ell_300_1600
            options:
              ell_300_1600:
                label: ℓ = 300–1600
              ell_100_3000:
                label: ℓ = 100–3000 (full range)
                excluded: true
                excluded_reason: E→B leakage at ℓ < 100 from mode-coupling matrix instability; noise-dominated above ℓ ~ 2000.
      paper-synthesis:
        name: Paper synthesis and conclusions
        description: Integrate results into the B-modes paper (Daley et al.) and companion config-space (Goh) and harmonic
          (Guerrini) papers.
        inputs:
        - id: scale_cuts
          type: data
          from: scale-cuts.fiducial_scale_cuts
        - id: mock_results
          type: data
          from: mock-validation.mock_pte_distribution
        - id: blind_report
          type: data
          from: blind-independence.blind_consistency_report
        - id: leakage
          type: data
          from: psf-leakage-correction.corrected_ellipticities
        outputs:
        - id: bmodes_paper
          type: report
          description: Daley et al. — UNIONS B-mode validation paper.
        - id: companion_support
          type: report
          description: B-mode validation sections for companion cosmology papers.
        findings:
          main_conclusion:
            claim: 'UNIONS B-modes are consistent with noise at fiducial scale cuts across all three estimators (pure E/B,
              COSEBIS, pseudo-Cℓ), four catalog versions, and with/without PSF leakage correction. The multi-estimator approach
              successfully identified a version-specific systematic in v1.4.8 that harmonic-space tests alone would have missed.
              Scale cuts of 5–83''/12–83'' (config) and ℓ = 300–1600 (harmonic) are validated for cosmological inference.

              '
            tags:
            - conclusion
            - key-finding
      unblinding:
        name: Unblinding ceremony
        description: 'Eight-figure reveal sequence: naked data, best-fit overlay, blind reveal, S₈ whisker in context with
          Planck/DES/KiDS/HSC.'
        inputs:
        - id: paper
          type: data
          from: paper-synthesis.bmodes_paper
        outputs:
        - id: ceremony_figures
          type: data
          description: Eight-figure unblinding sequence from data to cosmological context.
        findings:
          blind_b_physical:
            claim: 'Blind B is the physical cosmology. S₈ constraints from config-space and harmonic-space analyses are consistent
              with each other and with external surveys (Planck, DES Y3, KiDS-1000).

              '
            tags:
            - result
            - cosmology
